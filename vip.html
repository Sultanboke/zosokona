<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Dashboard</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b0e11;
  color:#eaecef;
}

/* HEADER */
.header {
  padding:15px;
  font-size:18px;
  font-weight:bold;
  border-bottom:1px solid #222;
}

/* CONTAINER */
.container {
  max-width:420px;
  margin:auto;
  padding:15px;
}

/* CARD */
.card {
  background:#1e2329;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
}

/* TEXT */
.label {
  font-size:12px;
  color:#848e9c;
}

.value {
  font-size:14px;
  margin-top:5px;
}

.status {
  color:#fcd535;
  font-weight:bold;
}

.success {
  color:#0ecb81;
  font-weight:bold;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:10px;
  background:#0b0e11;
  color:white;
  text-align:center;
}

/* BUTTON */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  font-size:14px;
}

.btn {
  background:#fcd535;
  color:#000;
  font-weight:bold;
}

.telegram {
  background:#0088cc;
  color:white;
}

/* RESULT */
.result {
  margin-top:15px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">VIP Dashboard</div>

<div class="container">

  <!-- STATUS -->
  <div class="card">
    <div class="label">Account Status</div>
    <div class="value status">Locked 🔒</div>
  </div>

  <!-- ORDER -->
  <div class="card">
    <div class="label">Product</div>
    <div class="value">VIP Access</div>

    <div class="label" style="margin-top:10px;">Payment Status</div>
    <div class="value">Waiting Verification</div>
  </div>

  <!-- BOT -->
  <div class="card">
    <div class="label">Verification</div>
    <div class="value">Get your VIP code via Telegram</div>

    <a href="https://t.me/telebokepcombot">
      <button class="telegram">Open Telegram Bot</button>
    </a>
  </div>

  <!-- INPUT -->
  <div class="card">
    <div class="label">Enter VIP Code</div>

    <input id="code" placeholder="Enter code">

    <button class="btn" onclick="unlock()">Unlock Access</button>

    <div class="result" id="result"></div>
  </div>

</div>

<script>
function unlock(){
  let code = document.getElementById("code").value;

  if(code === "VIP2024"){
    document.getElementById("result").innerHTML =
    "<div class='success'>Access Granted ✅</div><br>" +
    "<a href='https://t.me/+nYtXYGm--r85OWVl' style='color:#0ecb81;'>Enter VIP Group</a>";
  } else {
    document.getElementById("result").innerHTML =
    "<div style='color:#f6465d;'>Invalid Code</div>";
  }
}
</script>

</body>
</html>
