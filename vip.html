<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Dashboard</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  font-family:Arial;
  color:white;
}

.container{
  padding:15px;
}

h1{
  margin-bottom:20px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#111827,#1f2937);
  padding:15px;
  border-radius:16px;
  margin-bottom:15px;
}

/* STATUS */
.status{
  font-weight:bold;
}

.locked{color:#facc15;}
.unlocked{color:#00e676;}

/* INPUT FIX */
.input-box{
  width:100%;
  height:48px;
  border-radius:12px;
  border:none;
  outline:none;
  padding:0 12px;
  background:#020617;
  color:white;
  font-size:16px;
  box-sizing:border-box;
  margin-top:10px;
}

/* BUTTON FIX */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:12px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.btn-yellow{
  background:#facc15;
  color:black;
}

/* TELEGRAM BUTTON */
.btn-telegram{
  background:#0088cc;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

/* SUCCESS */
.success{
  margin-top:10px;
  color:#00e676;
  font-weight:bold;
}

/* HIDDEN */
.hidden{
  display:none;
}

/* ANIMATION */
.loading{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<h1>VIP Dashboard</h1>

<!-- STATUS -->
<div class="card">
  <div>Account Status</div>
  <div id="accStatus" class="status locked">Locked 🔒</div>
</div>

<!-- PRODUCT -->
<div class="card">
  <div>Product</div>
  <div>VIP Access</div>
  <div>Payment Status</div>
  <div id="payStatus" class="loading">Waiting Verification ⏳</div>
</div>

<!-- BOT -->
<div class="card">
  <div>Verification</div>
  <div>Get your VIP code via Telegram</div>

  <button class="btn btn-telegram"
  onclick="window.open('https://t.me/telebokepcombot')">
  🚀 Open Telegram Bot
  </button>
</div>

<!-- INPUT FIXED -->
<div class="card">
  <div>Enter VIP Code</div>

  <input id="vipCode" class="input-box" placeholder="Enter code">

  <button class="btn btn-yellow" onclick="unlockVIP()">
  Unlock Access
  </button>

  <div id="successBox" class="hidden">
    <div class="success">Access Granted ✅</div>

    <button class="btn btn-telegram"
    onclick="window.open('https://t.me/+nYtXYGm--r85OWVl')">
    📲 Join VIP Telegram
    </button>
  </div>
</div>

</div>

<script>

function unlockVIP(){
  let code = document.getElementById("vipCode").value;

  if(code === "VIP2024"){
    document.getElementById("accStatus").innerHTML = "Unlocked 🔓";
    document.getElementById("accStatus").className = "status unlocked";

    document.getElementById("payStatus").innerHTML = "Verification Success ✅";
    document.getElementById("payStatus").classList.remove("loading");

    document.getElementById("successBox").classList.remove("hidden");
  } else {
    alert("Invalid code ❌");
  }
}

</script>

</body>
</html>
