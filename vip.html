<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>VIP Access</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#000,#121212);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#111;
  padding:40px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,136,255,0.1);
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  font-size:15px;
}

.btn-telegram {
  background:#0088cc;
  color:white;
}

.btn-access {
  background:#00ffae;
  color:black;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:15px;
  background:#000;
  color:white;
}

.result {
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Akses VIP</h2>

  <p>Ambil kode akses melalui Telegram</p>

  <a href="https://t.me/telebokepcombot">
    <button class="btn-telegram">Ambil Kode</button>
  </a>

  <input type="text" id="code" placeholder="Masukkan kode VIP">

  <button class="btn-access" onclick="cek()">Masuk VIP</button>

  <div class="result" id="result"></div>
</div>

<script>
function cek() {
  var kode = document.getElementById("code").value;

  if (kode === "VIP2024") {
    document.getElementById("result").innerHTML =
    "✅ Akses berhasil<br><br><a href='https://t.me/+nYtXYGm--r85OWVl' style='color:#00ffae;'>Masuk Grup VIP</a>";
  } else {
    document.getElementById("result").innerHTML =
    "❌ Kode salah";
  }
}
</script>

</body>
</html>
