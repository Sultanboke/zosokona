<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0b0f1a;
  font-family:'Inter', sans-serif;
  color:white;
}

.container{
  padding:16px;
}

h1{
  font-size:22px;
  font-weight:600;
  margin-bottom:18px;
}

.card{
  background:linear-gradient(145deg,#111827,#1f2937);
  padding:14px;
  border-radius:14px;
  margin-bottom:12px;
}

.card div{
  font-size:13px;
  color:#9ca3af;
  margin-bottom:4px;
}

.status{
  font-size:14px;
  font-weight:600;
}

.locked{color:#facc15;}
.unlocked{color:#00e676;}

.input{
  width:100%;
  height:44px;
  border-radius:10px;
  border:none;
  outline:none;
  padding:0 12px;
  background:#020617;
  color:white;
  font-size:14px;
  margin-top:8px;
  box-sizing:border-box;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-weight:600;
  cursor:pointer;
}

.btn-yellow{
  background:#facc15;
  color:black;
}

.btn-telegram{
  background:#0088cc;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}

.success{
  margin-top:8px;
  color:#00e676;
  font-size:13px;
  font-weight:600;
}

.hidden{
  display:none;
}

.loading{
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.4;}
  100%{opacity:1;}
}
</style>

</head>

<body>

<div class="container">

<h1>VIP Dashboard</h1>

<div class="card">
  <div>Account Status</div>
  <div id="accStatus" class="status locked">Locked 🔒</div>
</div>

<div class="card">
  <div>Product</div>
  <strong>VIP Access</strong>
  <div>Payment Status</div>
  <div id="payStatus" class="loading">Waiting Verification ⏳</div>
</div>

<div class="card">
  <div>Verification</div>
  <div>Get your VIP code via Telegram</div>

  <button class="btn btn-telegram"
  onclick="window.open('https://t.me/telebokepcombot')">
  🚀 Open Telegram Bot
  </button>
</div>

<div class="card">
  <div>Enter VIP Code</div>

  <input id="vipCode" class="input" placeholder="Enter code">

  <button class="btn btn-yellow" onclick="unlockVIP()">
  Unlock Access
  </button>

  <div id="successBox" class="hidden">
    <div class="success">Access Granted ✅</div>

    <button class="btn btn-telegram"
    onclick="window.open('https://t.me/+nYtXYGm--r85OWVl')">
    📲 Join VIP Telegram
    </button>
  </div>
</div>

</div>

<script>

function unlockVIP(){
  let code = document.getElementById("vipCode").value;

  if(code === "VIP2024"){
    document.getElementById("accStatus").innerHTML = "Unlocked 🔓";
    document.getElementById("accStatus").className = "status unlocked";

    document.getElementById("payStatus").innerHTML = "Verification Success ✅";
    document.getElementById("payStatus").classList.remove("loading");

    document.getElementById("successBox").classList.remove("hidden");

  } else {
    alert("Invalid code ❌");
  }
}

</script>

</body>
</html>
