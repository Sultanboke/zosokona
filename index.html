<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Download</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body {
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
  font-size:18px;
  font-weight:700;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.container {
  display:grid;
  gap:10px;
  padding:10px;
}

/* 📱 HP = 3 kolom */
@media (min-width:0px){
  .container { grid-template-columns: repeat(3, 1fr); }
}

/* 💻 Tablet */
@media (min-width:600px){
  .container { grid-template-columns: repeat(4, 1fr); }
}

/* 🖥 Desktop */
@media (min-width:900px){
  .container { grid-template-columns: repeat(5, 1fr); }
}

/* CARD */
.card {
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* BUTTON AREA */
.actions {
  display:flex;
  gap:5px;
  padding:5px;
}

.btn {
  flex:1;
  font-size:12px;
  padding:6px;
  text-align:center;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  text-decoration:none;
  border-radius:5px;
}

/* LOADING */
.loading {
  text-align:center;
  padding:30px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="header">🔥 VIDEO DOWNLOAD 🔥</div>

<div id="list" class="container"></div>
<div id="loading" class="loading">Loading...</div>

<script>
fetch('data.json?v=' + Date.now())
.then(res => res.json())
.then(data => {

  data.reverse();

  const container = document.getElementById("list");
  document.getElementById("loading").style.display = "none";

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.img}" loading="lazy">
        <div class="actions">
          <a href="${item.link}" target="_blank" class="btn">WATCH</a>
          <a href="${item.link}" target="_blank" class="btn">DOWNLOAD</a>
        </div>
      </div>
    `;
  });

});
</script>

</body>
</html>
