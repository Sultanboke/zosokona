<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>VIP Access</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111;
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,255,150,0.1);
      border: 1px solid rgba(255,255,255,0.05);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    .price {
      font-size: 22px;
      color: #00ffae;
      margin-bottom: 20px;
    }

    .wallet {
      background: #000;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      word-break: break-all;
      margin-bottom: 20px;
      color: #0f0;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #00ffae, #00c853);
      color: black;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .info {
      font-size: 13px;
      margin-top: 15px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🔥 VIP ACCESS</h1>
  <div class="price">$5 Access</div>

  <p>Kirim USDT (TRC20) ke:</p>
  <div class="wallet">TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf</div>

  <button onclick="lanjut()">Saya Sudah Bayar</button>

  <div class="info">
    Pembayaran diverifikasi secara aman<br>
    Akses diberikan dalam hitungan detik
  </div>
</div>

<script>
function lanjut() {
  window.location.href = "vip.html";
}
</script>

</body>
</html>
