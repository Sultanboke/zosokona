<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Access</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:'Inter',sans-serif}
.container{max-width:420px;margin:auto;padding:20px}
.logo{font-size:18px;font-weight:600;opacity:.9;margin-bottom:28px}
.card{background:linear-gradient(145deg,#111827,#1f2937);padding:20px;border-radius:16px}
.title{font-size:20px;font-weight:600;margin-bottom:8px}
.desc{font-size:13px;color:#9ca3af;margin-bottom:14px}
.price{font-size:26px;font-weight:600;margin-bottom:4px}
.price span{font-size:13px;color:#9ca3af}
.list{font-size:13px;color:#d1d5db;margin:14px 0}
.list div{margin:6px 0}
.btn{width:100%;padding:14px;border:0;border-radius:12px;font-weight:600;cursor:pointer}
.btn-primary{background:#facc15;color:#000}
.footer{text-align:center;font-size:12px;color:#6b7280;margin-top:18px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">VIP Access</div>

  <div class="card">
    <div class="title">Unlock Premium Content</div>
    <div class="desc">Private access via crypto payment. Fast & simple.</div>

    <div class="price">2 USDT <span>/ one-time</span></div>

    <div class="list">
      <div>✔ Full VIP Access</div>
      <div>✔ Private Telegram Group</div>
      <div>✔ One-time payment</div>
    </div>

    <button class="btn btn-primary" onclick="goPayment()">Continue Payment</button>
  </div>

  <div class="footer">Secure payment • Private access • Instant unlock after verification</div>
</div>

<script>
function goPayment(){
  window.location.href = "/payment";
}
</script>
</body>
</html>
