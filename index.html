<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body {
  background:#0d0d0d;
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
  background:linear-gradient(90deg,#ff416c,#ff4b2b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.container {
  display:grid;
  gap:12px;
  padding:12px;
}

@media (min-width:0px){ .container{grid-template-columns:repeat(3,1fr);} }
@media (min-width:600px){ .container{grid-template-columns:repeat(4,1fr);} }
@media (min-width:900px){ .container{grid-template-columns:repeat(5,1fr);} }

/* CARD */
.card {
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card img {
  width:100%;
  height:130px;
  object-fit:cover;
}

/* ACTION */
.actions {
  display:flex;
  gap:6px;
  padding:6px;
}

/* BUTTON */
.btn {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  border-radius:8px;
  background:#2a2a2a;
  transition:0.2s;
  cursor:pointer;
}

.btn svg {
  width:20px;
  height:20px;
}

/* PLAY BUTTON */
.play {
  background:#1f2937;
}

.play svg {
  fill:#22c55e;
}

/* DOWNLOAD BUTTON */
.download {
  background:#1f2937;
}

.download svg {
  fill:#3b82f6;
}

/* HOVER EFFECT */
.btn:hover {
  transform:scale(1.1);
}

.play:hover {
  background:#22c55e;
}

.play:hover svg {
  fill:white;
}

.download:hover {
  background:#3b82f6;
}

.download:hover svg {
  fill:white;
}

/* PAGINATION */
.pagination {
  display:flex;
  justify-content:center;
  gap:8px;
  padding:20px;
}

.page-btn {
  padding:8px 12px;
  background:#222;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.page-btn.active {
  background:#ff416c;
}

.page-btn:hover {
  background:#ff416c;
}
</style>
</head>

<body>

<div class="header">🔥 PREMIUM VIDEO GALLERY 🔥</div>

<div id="list" class="container"></div>
<div id="pagination" class="pagination"></div>

<script>
const perPage = 15;
let currentPage = 1;
let allData = [];

fetch('data.json?v=' + Date.now())
.then(res => res.json())
.then(data => {

  allData = data.reverse();
  renderPage(1);
  renderPagination();

});

function renderPage(page){
  const container = document.getElementById("list");
  container.innerHTML = "";

  const start = (page - 1) * perPage;
  const end = start + perPage;
  const items = allData.slice(start, end);

  items.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.img}" loading="lazy">
        <div class="actions">

          <a href="${item.link}" target="_blank" class="btn play">
            <svg viewBox="0 0 24 24">
              <path d="M6 4l14 8-14 8z"/>
            </svg>
          </a>

          <a href="${item.link}" target="_blank" class="btn download">
            <svg viewBox="0 0 24 24">
              <path d="M12 4v10m0 0l-4-4m4 4l4-4M5 20h14" stroke="currentColor" stroke-width="2" fill="none"/>
            </svg>
          </a>

        </div>
      </div>
    `;
  });

  currentPage = page;
  updateActive();
}

function renderPagination(){
  const totalPages = Math.ceil(allData.length / perPage);
  const pagination = document.getElementById("pagination");

  pagination.innerHTML = "";

  for(let i = 1; i <= totalPages; i++){
    pagination.innerHTML += `
      <div class="page-btn" onclick="renderPage(${i})">${i}</div>
    `;
  }
}

function updateActive(){
  document.querySelectorAll(".page-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i+1 === currentPage);
  });
}
</script>

</body>
</html>
