<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Video Download</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body {
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:700;
  background: linear-gradient(45deg,#ff416c,#ff4b2b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.container {
  display:grid;
  gap:20px;
  padding:15px;
}

@media (min-width:0px){ .container{grid-template-columns:1fr;} }
@media (min-width:600px){ .container{grid-template-columns:repeat(2,1fr);} }
@media (min-width:900px){ .container{grid-template-columns:repeat(3,1fr);} }

/* CARD */
.card {
  background:#1a1a1a;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  display:block;
}

/* BUTTON */
.btn {
  display:block;
  margin:10px;
  padding:12px;
  text-align:center;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:500;
  transition:0.3s;
}

.btn:hover {
  opacity:0.8;
}

/* LOADING */
.loading {
  text-align:center;
  padding:50px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="header">🔥 VIDEO DOWNLOAD 🔥</div>

<div id="list" class="container"></div>

<div id="loading" class="loading">Loading...</div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {

    // 🔥 terbaru di atas
    data.reverse();

    const container = document.getElementById("list");
    const loading = document.getElementById("loading");

    loading.style.display = "none";

    data.forEach(item => {
      container.innerHTML += `
        <div class="card">
          <img src="${item.img}" loading="lazy">
          <a href="${item.link}" class="btn">DOWNLOAD</a>
        </div>
      `;
    });

  })
  .catch(() => {
    document.getElementById("loading").innerText = "Gagal load data";
  });
</script>

</body>
</html>
