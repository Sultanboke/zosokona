<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Links</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    text-align:center;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}

h1{
    margin-bottom:10px;
}

.bio{
    color:#cbd5e1;
    margin-bottom:25px;
}

.link{
    display:block;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:15px;
    margin:12px 0;
    border-radius:12px;
    transition:.3s;
}

.link:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}
</style>
</head>
<body>

<div class="container">
    <img src="avatar.jpg" alt="Profile" class="avatar">

    <h1>Nama Kamu</h1>
    <p class="bio">Creator | Freelancer | Developer</p>

    <a class="link" href="https://instagram.com/username" target="_blank">
        Instagram
    </a>

    <a class="link" href="https://youtube.com/@username" target="_blank">
        YouTube
    </a>

    <a class="link" href="https://wa.me/6281234567890" target="_blank">
        WhatsApp
    </a>

    <a class="link" href="https://github.com/username" target="_blank">
        GitHub
    </a>
</div>

</body>
</html>
