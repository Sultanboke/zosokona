<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Download</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body {
  background:#0f0f0f;
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
  font-weight:700;
  font-size:18px;
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* GRID */
.container {
  display:grid;
  gap:10px;
  padding:10px;
}

@media (min-width:0px){ .container{grid-template-columns:repeat(3,1fr);} }
@media (min-width:600px){ .container{grid-template-columns:repeat(4,1fr);} }
@media (min-width:900px){ .container{grid-template-columns:repeat(5,1fr);} }

/* CARD */
.card {
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
}

/* ACTION BUTTON */
.actions {
  display:flex;
  gap:5px;
  padding:5px;
}

.btn {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  background:#222;
  border-radius:6px;
  transition:0.2s;
}

.btn svg {
  width:18px;
  height:18px;
  fill:white;
}

.btn:hover {
  background:#ff416c;
  transform:scale(1.1);
}

.btn:hover svg {
  filter: drop-shadow(0 0 5px #ff416c);
}

/* PAGINATION */
.pagination {
  display:flex;
  justify-content:center;
  margin:20px;
  gap:10px;
}

.page-btn {
  padding:8px 12px;
  background:#222;
  border-radius:5px;
  cursor:pointer;
}

.page-btn.active {
  background:#ff416c;
}
</style>
</head>

<body>

<div class="header">🔥 VIDEO DOWNLOAD 🔥</div>

<div id="list" class="container"></div>
<div id="pagination" class="pagination"></div>

<script>
const perPage = 15;
let currentPage = 1;
let allData = [];

fetch('data.json?v=' + Date.now())
.then(res => res.json())
.then(data => {

  allData = data.reverse();
  renderPage(1);
  renderPagination();

});

function renderPage(page){
  const container = document.getElementById("list");
  container.innerHTML = "";

  const start = (page - 1) * perPage;
  const end = start + perPage;
  const items = allData.slice(start, end);

  items.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <img src="${item.img}" loading="lazy">
        <div class="actions">
          <a href="${item.link}" target="_blank" class="btn">
            <svg viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </a>

          <a href="${item.link}" target="_blank" class="btn">
            <svg viewBox="0 0 24 24">
              <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 19h14"/>
            </svg>
          </a>
        </div>
      </div>
    `;
  });

  currentPage = page;
  updateActive();
}

function renderPagination(){
  const totalPages = Math.ceil(allData.length / perPage);
  const pagination = document.getElementById("pagination");

  pagination.innerHTML = "";

  for(let i = 1; i <= totalPages; i++){
    pagination.innerHTML += `
      <div class="page-btn" onclick="renderPage(${i})">${i}</div>
    `;
  }
}

function updateActive(){
  document.querySelectorAll(".page-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i+1 === currentPage);
  });
}
</script>

</body>
</html>
