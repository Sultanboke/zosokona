<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Video Download</title>

  <!-- FONT KEREN -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .container {
      display: grid;
      gap: 20px;
      padding: 20px;
    }

    /* RESPONSIVE GRID */
    @media (min-width: 0px) {
      .container { grid-template-columns: 1fr; }
    }

    @media (min-width: 600px) {
      .container { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 900px) {
      .container { grid-template-columns: repeat(3, 1fr); }
    }

    .card {
      background: #1a1a1a;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .btn {
      display: block;
      margin: 10px;
      padding: 12px;
      text-align: center;
      background: linear-gradient(45deg, #ff416c, #ff4b2b);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<h1>🔥 VIDEO DOWNLOAD 🔥</h1>

<div class="container">

    <img src="https://i.ibb.co/ymtbCjdz/IMG-1.jpg" loading="lazy">

  </div>

</html>
