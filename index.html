<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Score Pro</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #fff;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
}

.match {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  margin: 12px 0;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.teams {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.team {
  display: flex;
  align-items: center;
  gap: 10px;
}

.team img {
  width: 30px;
  height: 30px;
}

.score {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  margin: 10px 0;
}

.status {
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
}

.live {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>⚽ Live Score Pro</h1>
<div class="container" id="matches">Loading...</div>

<script>
const API_KEY = "6f9f28e3412c46ab8c446d873bfd48f7";
const URL = "https://api.football-data.org/v4/matches";

async function loadMatches() {
  try {
    const res = await fetch(URL, {
      headers: { "X-Auth-Token": API_KEY }
    });

    console.log("STATUS:", res.status);

    const data = await res.json();
    const container = document.getElementById("matches");
    container.innerHTML = "";

    data.matches.slice(0, 15).forEach(match => {
      const home = match.homeTeam.name;
      const away = match.awayTeam.name;

      const homeLogo = match.homeTeam.crest;
      const awayLogo = match.awayTeam.crest;

      const scoreHome = match.score.fullTime.home ?? "-";
      const scoreAway = match.score.fullTime.away ?? "-";

      let status = match.status;
      if (status === "IN_PLAY") status = "🔴 LIVE";

      const el = document.createElement("div");
      el.className = "match";

      el.innerHTML = `
        <div class="teams">
          <div class="team">
            <img src="${homeLogo || ''}" onerror="this.style.display='none'">
            <span>${home}</span>
          </div>
          <div class="team">
            <span>${away}</span>
            <img src="${awayLogo || ''}" onerror="this.style.display='none'">
          </div>
        </div>

        <div class="score">${scoreHome} - ${scoreAway}</div>
        <div class="status ${status.includes('LIVE') ? 'live' : ''}">
          ${status}
        </div>
      `;

      container.appendChild(el);
    });

  } catch (err) {
    document.getElementById("matches").innerHTML = "❌ Gagal load data";
    console.error(err);
  }
}

loadMatches();

// refresh tiap 60 detik
setInterval(loadMatches, 60000);
</script>

</body>
</html>
