<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Access</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0b0b0b;
  color:white;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card {
  background:#121212;
  padding:25px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,150,0.08);
}

h1 {
  font-size:22px;
}

.price {
  color:#00ffa6;
  margin-bottom:10px;
}

.badge {
  font-size:12px;
  color:#aaa;
  margin-bottom:15px;
}

.wallet {
  background:#000;
  padding:12px;
  border-radius:10px;
  font-size:12px;
  word-break:break-all;
  color:#0f0;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:12px;
  font-size:15px;
}

.copy {
  background:#222;
  color:white;
}

.pay {
  background:linear-gradient(135deg,#00ffa6,#00c853);
  color:black;
}

.timer {
  margin-top:10px;
  color:#ff5252;
}

.loader {
  display:none;
  margin-top:15px;
}

.loader span {
  display:inline-block;
  width:8px;
  height:8px;
  background:#00ffa6;
  border-radius:50%;
  margin:3px;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce {
  0%,80%,100% { transform:scale(0); }
  40% { transform:scale(1); }
}

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 15px;
  border-radius:10px;
  font-size:12px;
  display:none;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h1>💎 VIP ACCESS</h1>
    <div class="price">$5 USDT (TRC20)</div>

    <div class="badge">
      🔒 Payment secured by blockchain<br>
      ⚡ Auto verification system enabled
    </div>

    <div class="wallet" id="wallet">
      TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf
    </div>

    <button class="copy" onclick="copyWallet()">Copy Address</button>

    <div class="timer" id="timer">05:00</div>

    <button class="pay" onclick="pay()">I HAVE PAID</button>

    <div class="loader" id="loader">
      Verifying payment...
      <br>
      <span></span><span></span><span></span>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let time = 300;

setInterval(() => {
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerHTML =
  m + ":" + (s<10?"0":"") + s;
  time--;
},1000);

function copyWallet(){
  navigator.clipboard.writeText("TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf");
  showToast("Address copied");
}

function pay(){
  document.getElementById("loader").style.display="block";

  setTimeout(()=>{
    showToast("Payment confirmed");
    window.location.href="vip.html";
  },3000);
}

function showToast(msg){
  let t = document.getElementById("toast");
  t.innerHTML = msg;
  t.style.display="block";
  setTimeout(()=>{t.style.display="none";},2000);
}

// FAKE LIVE PURCHASE POPUP
setInterval(()=>{
  let names=["User123","CryptoKing","VIPBuyer","AnonX"];
  let random = names[Math.floor(Math.random()*names.length)];
  showToast(random+" just purchased VIP");
},8000);
</script>

</body>
</html>
