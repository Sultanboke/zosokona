<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telebokep Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0d0d0d;color:white;padding-top:40px;overflow-x:hidden;}

/* STICKY */
.sticky-banner{
position:fixed;top:0;width:100%;
background:#0088cc;color:white;
text-align:center;padding:8px;
font-size:13px;z-index:9999;
}

/* HEADER */
.header{
text-align:center;padding:20px;font-size:20px;font-weight:700;
background:linear-gradient(90deg,#ff416c,#ff4b2b);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* BUTTON */
.topbar{display:flex;gap:10px;justify-content:center;padding:10px;}
.tg-btn{padding:8px 12px;border-radius:8px;text-decoration:none;color:white;font-size:13px;}
.jap{background:#229ED9;}
.indo{background:#0088cc;}

/* ONLINE */
.online{text-align:center;font-size:13px;opacity:0.8;margin-bottom:10px;}

/* GRID */
.container{
display:grid;
gap:12px;
padding:12px;
grid-template-columns:repeat(3,1fr);
}

/* CARD */
.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
}

/* 🔥 FIX GAMBAR TIDAK LONJONG */
.img-box{
width:100%;
aspect-ratio:1/1; /* kotak */
overflow:hidden;
}
.img-box canvas{
width:100%;
height:100%;
object-fit:cover;
}

/* ACTION */
.actions{
display:flex;
gap:8px;
padding:8px;
}
.btn{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:10px;
border-radius:10px;
background:#2a2a2a;
font-size:18px;
}
.play{color:#22c55e;}
.download{color:#3b82f6;}

/* PAGINATION */
.pagination{
display:flex;
justify-content:center;
gap:8px;
padding:20px;
}
.page-btn{
padding:8px 12px;
background:#222;
border-radius:6px;
cursor:pointer;
}
.page-btn.active{background:#ff416c;}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
font-size:12px;
opacity:0.6;
border-top:1px solid #222;
}
</style>
</head>

<body>

<div class="sticky-banner">
🚀 Join Telegram:
<a href="https://t.me/+xdqla0uz7z42ZGU9" target="_blank" style="color:white;">Japanese</a> |
<a href="https://t.me/+xdqla0uz7z42ZGU9" target="_blank" style="color:white;">Indo Viral</a>
</div>

<div class="header">🔥 TELEBOKEP GALLERY 🔥</div>

<div class="topbar">
<a href="https://t.me/+xdqla0uz7z42ZGU9" target="_blank" class="tg-btn jap">Japanese</a>
<a href="https://t.me/+xdqla0uz7z42ZGU9" target="_blank" class="tg-btn indo">Indo Viral</a>
</div>

<div class="online">🟢 <span id="onlineCount">0</span> online</div>

<div id="list" class="container"></div>
<div id="pagination" class="pagination"></div>

<div class="footer">
© 2026 by telebokep
</div>

<script>

/* DATA */
const perPage=12;
let currentPage=1;
let allData=[];

fetch('data.json')
.then(r=>r.json())
.then(data=>{
allData=data.reverse();
renderPage(1);
});

/* RENDER */
function renderPage(page){
currentPage=page;
const list=document.getElementById("list");
list.innerHTML="";

let start=(page-1)*perPage;
let items=allData.slice(start,start+perPage);

items.forEach(item=>{
list.innerHTML+=`
<div class="card">
<div class="img-box" data-img="${item.img}"></div>
<div class="actions">
<a href="${item.link}" target="_blank" class="btn play">▶</a>
<a href="${item.link}" target="_blank" class="btn download">⬇</a>
</div>
</div>`;
});

renderCanvas();
renderPagination();
}

/* CANVAS */
function renderCanvas(){
document.querySelectorAll('.img-box').forEach(el=>{
let img=new Image();
img.src=el.dataset.img;

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);
el.appendChild(canvas);
};
});
}

/* PAGINATION SIMPLE */
function renderPagination(){
let total=Math.ceil(allData.length/perPage);
let html="";

/* BACK */
if(currentPage>1){
html+=`<div class="page-btn" onclick="renderPage(${currentPage-1})">⬅</div>`;
}

/* PAGE 1-3 */
for(let i=currentPage;i<currentPage+3 && i<=total;i++){
html+=`<div class="page-btn ${i===currentPage?'active':''}" onclick="renderPage(${i})">${i}</div>`;
}

/* NEXT */
if(currentPage<total){
html+=`<div class="page-btn" onclick="renderPage(${currentPage+1})">➡</div>`;
}

pagination.innerHTML=html;
}

/* ONLINE */
let online=100;
setInterval(()=>{
online+=Math.random()*6-3;
document.getElementById("onlineCount").innerText=Math.floor(online);
},2000);

</script>

</body>
</html>
