<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b0f1a;
  color:white;
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:420px;
  margin:auto;
}

/* HEADER */
.logo{
  font-size:18px;
  font-weight:600;
  margin-bottom:30px;
  opacity:0.9;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#111827,#1f2937);
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:10px;
}

/* TEXT */
.desc{
  font-size:13px;
  color:#9ca3af;
  margin-bottom:15px;
}

/* PRICE */
.price{
  font-size:26px;
  font-weight:600;
  margin-bottom:5px;
}

.price span{
  font-size:14px;
  color:#9ca3af;
}

/* LIST */
.list{
  font-size:13px;
  color:#d1d5db;
  margin-bottom:15px;
}

.list div{
  margin-bottom:6px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.btn-primary{
  background:#facc15;
  color:black;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:12px;
  color:#6b7280;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">VIP Access</div>

<div class="card">
  <div class="title">Unlock Premium Content</div>

  <div class="desc">
    Access exclusive VIP content with fast and secure crypto payment.
  </div>

  <div class="price">
    2 USDT <span>/ one-time</span>
  </div>

  <div class="list">
    <div>✔ Full VIP Access</div>
    <div>✔ Instant Unlock</div>
    <div>✔ Private Telegram Group</div>
  </div>

  <button class="btn btn-primary"
  onclick="goPayment()">
    Continue Payment
  </button>
</div>

<div class="footer">
  Payment secured • Private access • Instant activation
</div>

</div>

<script>
function goPayment(){
  window.location.href = "payment.html";
}
</script>

</body>
</html>
