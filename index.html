<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Telegram Access</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100dvh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:
        radial-gradient(circle at top left,#1e293b 0%,#0f172a 35%,#020617 100%);
    color:#fff;
}

.card{
    width:min(420px,90vw);
    padding:40px;
    border-radius:32px;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.08);
    text-align:center;
}

.logo{
    width:90px;
    height:90px;
    margin:0 auto 24px;
    border-radius:24px;
    background:linear-gradient(135deg,#229ED9,#38BDF8);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
}

.badge{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    color:#cbd5e1;
    font-size:13px;
    margin-bottom:18px;
}

h1{
    font-size:30px;
    font-weight:700;
    margin-bottom:12px;
}

p{
    color:#94a3b8;
    line-height:1.7;
    margin-bottom:30px;
}

.button{
    display:block;
    text-decoration:none;
    color:#fff;
    padding:18px;
    border-radius:18px;
    font-weight:600;
    font-size:17px;
    background:linear-gradient(135deg,#229ED9,#38BDF8);
    box-shadow:0 10px 30px rgba(34,158,217,.35);
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#64748b;
}
</style>
</head>
<body>

<div class="card">

    <div class="logo">✈</div>

    <div class="badge">PRIVATE CHANNEL</div>

    <h1>Telegram Only 21+</h1>

    <p>
     Private content access with no fees or membership requirements. Unlimited Viewing.
    </p>

    <a class="button"
       href="https://t.me/+fpC5TNg56Jg4YWNl"
       target="_blank">
        Click Here Join Now
    </a>

    <div class="footer">
        Secure invitation access
    </div>

</div>

</body>
</html>
