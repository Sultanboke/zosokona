<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Checkout</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0a0a0a;
  color:white;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card {
  background:#121212;
  padding:25px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,150,0.08);
}

h2 {
  margin-bottom:5px;
}

.status {
  font-size:13px;
  color:#aaa;
  margin-bottom:15px;
}

.qr img {
  width:180px;
}

.wallet {
  background:#000;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  word-break:break-all;
  margin-top:10px;
  color:#0f0;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:12px;
  font-size:15px;
}

.copy {
  background:#222;
  color:white;
}

.pay {
  background:linear-gradient(135deg,#00ffa6,#00c853);
  color:black;
}

.timer {
  margin-top:10px;
  color:#ff5252;
}

.progress {
  height:6px;
  background:#222;
  border-radius:10px;
  margin-top:15px;
  overflow:hidden;
  display:none;
}

.bar {
  height:100%;
  width:0%;
  background:#00ffa6;
}

.log {
  margin-top:10px;
  font-size:12px;
  color:#aaa;
  min-height:20px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💳 Secure Crypto Checkout</h2>
    <div class="status">Powered by Blockchain Network</div>

    <div class="qr">
      <img src="qr.png">
    </div>

    <div class="wallet">
      TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf
    </div>

    <button class="copy" onclick="copyWallet()">Copy Address</button>

    <div class="timer" id="timer">05:00</div>

    <button class="pay" onclick="startVerify()">I HAVE PAID</button>

    <div class="progress" id="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="log" id="log"></div>

  </div>
</div>

<script>
let time = 300;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerHTML =
  m + ":" + (s<10?"0":"")+s;
  time--;
},1000);

function copyWallet(){
  navigator.clipboard.writeText("TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf");
  alert("Address copied");
}

function startVerify(){
  let log = document.getElementById("log");
  let bar = document.getElementById("bar");
  let progress = document.getElementById("progress");

  progress.style.display="block";

  let steps = [
    "🔍 Detecting transaction...",
    "📡 Connecting to TRON network...",
    "⛓️ Transaction found",
    "⚡ Confirming (1/3)...",
    "⚡ Confirming (2/3)...",
    "⚡ Confirming (3/3)...",
    "✅ Payment confirmed"
  ];

  let i = 0;
  let width = 0;

  let interval = setInterval(()=>{
    log.innerHTML = steps[i];
    width += 15;
    bar.style.width = width + "%";

    i++;

    if(i >= steps.length){
      clearInterval(interval);

      setTimeout(()=>{
        window.location.href="vip.html";
      },1500);
    }

  },1200);
}
</script>

</body>
</html>
