<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#050505;
  color:white;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card {
  background:#0f0f0f;
  padding:25px;
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,255,150,0.08);
}

h2 {
  text-align:center;
}

.sub {
  text-align:center;
  font-size:12px;
  color:#aaa;
  margin-bottom:15px;
}

.wallet {
  background:#000;
  padding:12px;
  border-radius:10px;
  font-size:12px;
  word-break:break-all;
  color:#00ffa6;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:14px;
}

.copy {
  background:#1a1a1a;
  color:white;
}

.pay {
  background:linear-gradient(135deg,#00ffa6,#00c853);
  color:black;
  font-weight:bold;
}

.timer {
  text-align:center;
  margin-top:10px;
  color:#ff5252;
}

.progress {
  height:6px;
  background:#222;
  border-radius:10px;
  margin-top:15px;
  overflow:hidden;
  display:none;
}

.bar {
  height:100%;
  width:0%;
  background:#00ffa6;
}

.logs {
  margin-top:15px;
  font-size:11px;
  color:#00ffa6;
  font-family:monospace;
  height:90px;
  overflow:hidden;
}

.txid {
  font-size:10px;
  color:#aaa;
  margin-top:10px;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💳 Secure Crypto Checkout</h2>
    <div class="sub">TRON Network • USDT (TRC20)</div>

    <div class="wallet">
      TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf
    </div>

    <button class="copy" onclick="copyWallet()">Copy Address</button>

    <div class="timer" id="timer">05:00</div>

    <button class="pay" onclick="start()">I HAVE PAID</button>

    <div class="progress" id="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="logs" id="logs"></div>

    <div class="txid" id="txid"></div>

  </div>
</div>

<script>
let time = 300;

setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerHTML =
  m + ":" + (s<10?"0":"")+s;
  time--;
},1000);

function copyWallet(){
  navigator.clipboard.writeText("TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf");
  alert("Copied");
}

function generateTXID(){
  let chars="abcdef0123456789";
  let tx="";
  for(let i=0;i<64;i++){
    tx+=chars[Math.floor(Math.random()*chars.length)];
  }
  return tx;
}

function start(){

  let logs = document.getElementById("logs");
  let bar = document.getElementById("bar");
  let progress = document.getElementById("progress");

  progress.style.display="block";

  let steps = [
    "[+] Connecting to TRON node...",
    "[+] Syncing mempool...",
    "[+] Transaction detected",
    "[+] Validating hash...",
    "[+] Checking confirmations (1/3)",
    "[+] Checking confirmations (2/3)",
    "[+] Checking confirmations (3/3)",
    "[✓] Payment confirmed"
  ];

  let i=0;
  let width=0;

  let interval = setInterval(()=>{

    logs.innerHTML += steps[i] + "<br>";

    width += 12;
    bar.style.width = width + "%";

    i++;

    if(i >= steps.length){
      clearInterval(interval);

      document.getElementById("txid").innerHTML =
      "TXID: " + generateTXID();

      setTimeout(()=>{
        window.location.href="vip.html";
      },2000);
    }

  },900);
}
</script>

</body>
</html>
