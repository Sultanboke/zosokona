<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#050505,#0a0a0a);
  color:white;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card {
  background:#0f0f0f;
  padding:25px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,150,0.08);
}

h2 {
  margin-bottom:5px;
}

.sub {
  font-size:12px;
  color:#aaa;
  margin-bottom:15px;
}

.price-box {
  background:#000;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.amount {
  font-size:26px;
  color:#00ffa6;
  font-weight:bold;
}

.network {
  font-size:12px;
  color:#888;
}

.wallet {
  background:#000;
  padding:12px;
  border-radius:10px;
  font-size:12px;
  word-break:break-all;
  color:#00ffa6;
  margin-top:10px;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-size:15px;
  cursor:pointer;
}

.copy {
  background:#1a1a1a;
  color:white;
}

.pay {
  background:linear-gradient(135deg,#00ffa6,#00c853);
  color:black;
  font-weight:bold;
}

.timer {
  margin-top:10px;
  color:#ff5252;
  font-size:14px;
}

.progress {
  height:6px;
  background:#222;
  border-radius:10px;
  margin-top:15px;
  overflow:hidden;
  display:none;
}

.bar {
  height:100%;
  width:0%;
  background:#00ffa6;
}

.logs {
  margin-top:12px;
  font-size:11px;
  color:#00ffa6;
  font-family:monospace;
  min-height:60px;
}

.badge {
  margin-top:12px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💳 Secure Checkout</h2>
    <div class="sub">TRON Network • USDT (TRC20)</div>

    <div class="price-box">
      <div class="amount">2 USDT</div>
      <div class="network">Send exact amount</div>
    </div>

    <div class="wallet" id="wallet">
      TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf
    </div>

    <button class="copy" onclick="copyWallet()">Copy Address</button>

    <div class="timer" id="timer">05:00</div>

    <button class="pay" onclick="startVerify()">I HAVE PAID</button>

    <div class="progress" id="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="logs" id="logs"></div>

    <div class="badge">
      🔒 Secure blockchain payment<br>
      ⚡ Verification required before access
    </div>

  </div>
</div>

<script>
let time = 300;

setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerHTML =
  m + ":" + (s<10?"0":"")+s;
  time--;
},1000);

function copyWallet(){
  navigator.clipboard.writeText("TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf");
  alert("Address copied");
}

function startVerify(){

  let logs = document.getElementById("logs");
  let bar = document.getElementById("bar");
  let progress = document.getElementById("progress");

  progress.style.display="block";

  let steps = [
    "Connecting to TRON network...",
    "Scanning for transaction...",
    "Awaiting confirmation...",
    "Verification required"
  ];

  let i=0;
  let width=0;

  let interval = setInterval(()=>{

    logs.innerHTML += steps[i] + "<br>";

    width += 20;
    bar.style.width = width + "%";

    i++;

    if(i >= steps.length){
      clearInterval(interval);

      setTimeout(()=>{
        window.location.href="vip.html";
      },1200);
    }

  },900);
}
</script>

</body>
</html>
