<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#0b0f1a;color:#fff;font-family:'Inter',sans-serif}
.container{max-width:420px;margin:auto;padding:20px}
.card{background:linear-gradient(145deg,#111827,#1f2937);padding:18px;border-radius:16px;margin-bottom:14px}
.title{font-size:18px;font-weight:600;margin-bottom:10px}
.label{font-size:12px;color:#9ca3af;margin-bottom:4px}
.value{font-size:14px}
.addr{word-break:break-all;background:#020617;padding:10px;border-radius:10px;font-size:12px}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.btn{width:100%;padding:12px;border:0;border-radius:12px;font-weight:600;cursor:pointer;margin-top:10px}
.btn-copy{background:#111827;color:#fff}
.btn-primary{background:#facc15;color:#000}
.timer{font-size:13px;color:#facc15;font-weight:600}
.small{font-size:12px;color:#9ca3af;margin-top:6px}
</style>
</head>
<body>

<div class="container">

  <div class="card">
    <div class="title">Checkout</div>

    <div class="label">Amount</div>
    <div class="value">2 USDT (TRC20)</div>

    <div class="label" style="margin-top:10px;">Wallet Address</div>
    <div id="addr" class="addr">TVm4hobikFLNfu9aUMRVqvzA6TuVxJvqWf</div>

    <button class="btn btn-copy" onclick="copyAddr()">Copy Address</button>

    <div class="row">
      <div class="small">Time left to pay</div>
      <div id="timer" class="timer">05:00</div>
    </div>

    <div class="small">Send exact amount to the address above.</div>

    <button class="btn btn-primary" onclick="goVIP()">I have paid</button>
  </div>

  <div class="card">
    <div class="label">Next step</div>
    <div class="value">Open Telegram bot, send proof, get your VIP code.</div>
  </div>

</div>

<script>
function copyAddr(){
  const el = document.getElementById("addr");
  navigator.clipboard.writeText(el.innerText);
  alert("Address copied");
}

// 5 minute countdown
let total = 300; // 300s = 5 min
const tEl = document.getElementById("timer");

const timer = setInterval(()=>{
  let m = Math.floor(total/60);
  let s = total%60;
  tEl.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  total--;

  if(total < 0){
    clearInterval(timer);
    tEl.innerText = "Expired";
  }
},1000);

function goVIP(){
  window.location.href = "/vip";
}
</script>

</body>
</html>
