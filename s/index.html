*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0d0d0d;color:white;padding-top:40px;overflow-x:hidden;}


/* HEADER */

/* 🔥 FIX GAMBAR TIDAK LONJONG */

.img-box canvas{

}

/* ACTION */

padding:8px;
}

}

/* FOOTER */

padding:20px;
font-size:12px;
opacity:0.6;

<script>

/* DATA */
const perPage=36;
let currentPage=1;
let allData=[];

Promise.allSettled([
  fetch('databkp/zoxo2.json').then(r => r.json()),
  fetch('databkp/zoxo1.json').then(r => r.json())
]).then(results => {

  allData = [];

  results.forEach(result => {
    if (result.status === "fulfilled") {
      allData.push(...result.value.reverse());
    }
  });

  renderPage(1);

});

/* RENDER */
function renderPage(page){
currentPage=page;
const list=document.getElementById("list");
list.innerHTML="";

let start=(page-1)*perPage;
let items=allData.slice(start,start+perPage);

items.forEach((item,index)=>{

list.innerHTML+=`
<div class="card">
<div class="img-box" data-img="${item.img}"></div>
<div class="actions">
<a href="${item.link}" target="_blank" class="btn play">▶</a>
<a href="${item.link}" target="_blank" class="btn download">⬇</a>
</div>
</div>`;

if(index === 8 || index === 17 || index === 26){
list.innerHTML+=`
<div class="middle-banner">
<a href="https://xfreebokep.xyz/terabuy" target="_blank">
<img src="featured-top.png" alt="Featured">
</a>
</div>`;
}

});

renderCanvas();
renderPagination();
}

/* CANVAS */
function renderCanvas(){
document.querySelectorAll('.img-box').forEach(el=>{
let img=new Image();
img.src=el.dataset.img;

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);
el.appendChild(canvas);
};
});
}

/* PAGINATION SIMPLE */
function renderPagination(){
let total=Math.ceil(allData.length/perPage);
let html="";

/* BACK */
if(currentPage>1){
html+=`<div class="page-btn" onclick="renderPage(${currentPage-1})">⬅</div>`;
}

/* PAGE 1-3 */
for(let i=currentPage;i<currentPage+3 && i<=total;i++){
html+=`<div class="page-btn ${i===currentPage?'active':''}" onclick="renderPage(${i})">${i}</div>`;
}

/* NEXT */
if(currentPage<total){
html+=`<div class="page-btn" onclick="renderPage(${currentPage+1})">➡</div>`;
}

pagination.innerHTML=html;
}

/* ONLINE */
let online=100;
setInterval(()=>{
online+=Math.random()*6-3;
document.getElementById("onlineCount").innerText=Math.floor(online);
},2000);

</script>
