<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Linkdoodvi Updates</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;
background:#0a0a0a;
color:#fff;
background-image:radial-gradient(circle at top,#1a1a1a,#0a0a0a 45%);
}
header{
position:sticky;top:0;z-index:99;
padding:16px;
text-align:center;
background:rgba(10,10,10,.78);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.08);
}
.logo{font-size:26px;font-weight:800;color:#e50914}
.hero{
margin:14px;
padding:24px 18px;
border-radius:20px;
background:linear-gradient(135deg,#1b1b1b,#101010);
border:1px solid rgba(255,255,255,.08);
}
.hero h1{font-size:26px}
.hero p{margin-top:8px;color:#a7a7a7;font-size:14px}
.running{
margin-top:15px;
background:#181818;
padding:8px;
border-radius:10px;
color:#e50914;
font-size:13px;
}
.top-menu{
display:flex;
gap:10px;
padding:0 14px 14px;
}
.menu-btn{
flex:1;
text-align:center;
padding:12px;
background:#181818;
border:1px solid rgba(255,255,255,.08);
border-radius:999px;
color:#fff;
text-decoration:none;
font-size:14px;
font-weight:600;
}
.announcement{
margin:0 14px 14px;
padding:12px;
border-radius:12px;
background:#e50914;
font-size:13px;
font-weight:600;
text-align:center;
}
.container{padding:14px}
.post{
background:#151515;
border:1px solid rgba(255,255,255,.08);
border-radius:16px;
padding:16px;
margin-bottom:14px;
animation:fade .35s;
}
.post h2{
font-size:17px;
line-height:1.5;
margin-bottom:14px;
}
.links{
display:flex;
flex-direction:column;
gap:10px;
}
.links a{
text-decoration:none;
background:#229ED9;
color:#fff;
padding:12px;
border-radius:10px;
font-size:14px;
font-weight:700;
text-align:center;
}
footer{
padding:25px;
text-align:center;
font-size:12px;
color:#777;
}
@keyframes fade{
from{opacity:0;transform:translateY(12px)}
to{opacity:1;transform:none}
}
</style>
</head>
<body>

<header>
<div class="logo">LINKDOODVI</div>
</header>

<section class="hero">
<h1>Link Dood</h1>
<div class="running">
<marquee scrollamount="5">🔥 Updated Every Day • Premium Links • Fast Access • Bookmark This Website</marquee>
</div>
<p>Daily Link Updates</p>
</section>

<div class="top-menu">
<a href="tutorial.html" class="menu-btn">🎬 Tutorial Watch</a>
<a href="disclaimer.html" class="menu-btn">⚠️ Disclaimer</a>
</div>

<div class="announcement">
📢 New Collection Added Today • Check The Latest Updates Below!
</div>

<div id="posts" class="container"></div>

<footer>© 2026 Linkdoodvi Updates</footer>

<script>
const posts=document.getElementById("posts");
let all=[];

fetch("posts.json")
.then(r=>r.json())
.then(data=>{
all=data.reverse();
render(all);
});

function render(list){
posts.innerHTML="";
list.forEach((post,index)=>{
let html=`<div class="post">
<h2>${index<5?'':''}${post.title}</h2>
<div class="links">`;
post.links.forEach((link,i)=>{
html+=`<a href="${link}" target="_blank">▶ Link ${i+1}</a>`;
});
html+=`</div></div>`;
posts.innerHTML+=html;
});
}
</script>

</body>
</html>
