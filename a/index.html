<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Linkdoodvi Updates</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#0a0a0a;color:#fff;background-image:radial-gradient(circle at top,#1a1a1a,#0a0a0a 45%)}

header{
position:sticky;
top:0;
z-index:99;
text-align:center;
padding:16px;
background:rgba(10,10,10,.75);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:24px;
font-weight:700;
color:#e50914;
}

.hero{
margin:12px;
border-radius:18px;
padding:24px 18px;
}

.hero h1{
font-size:26px;
}

.hero p{color:#aaa;margin-top:8px}
.running{margin-top:15px;padding:8px;border-radius:10px;background:#181818;color:#e50914}
.top-menu{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:0 18px 18px}
.menu-btn{padding:12px 20px;border-radius:999px;text-decoration:none;color:#fff;background:#181818;border:1px solid rgba(255,255,255,.08)}

.announcement{
font-size:13px;
font-weight:600;
}

.banner{max-width:728px;margin:18px auto;padding:0 18px}
.banner img{width:100%;border-radius:12px;display:block}
.container{max-width:900px;margin:auto;padding:18px}
.post{background:#141414;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:18px;margin-bottom:18px;animation:fade .4s}

.post h2{
font-size:16px;
font-weight:700;
line-height:1.4;
}

.links{display:grid;gap:10px}

.links a{
padding:12px;
font-size:14px;
font-weight:600;
}

footer{text-align:center;padding:30px;color:#666}
@keyframes fade{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<header>
<div class="logo">LINKDOODVI</div>
</header>

<section class="hero">
<h1>Link Dood</h1>
<div class="running"><marquee scrollamount="5">🔥 Updated Every Day • Premium Links • Fast Access • Bookmark This Website</marquee></div>
<p>Daily Link Updates</p>
</section>

<div class="top-menu">
<a href="tutorial.html" class="menu-btn">🎬 Tutorial Watch</a>
<a href="disclaimer.html" class="menu-btn">⚠️ Disclaimer</a>
</div>

<div class="announcement">📢 New Collection Added Today • Check The Latest Updates Below!</div>

<div id="posts" class="container"></div>

<footer>© 2026 Linkdoodvi Updates</footer>

<script>
const posts=document.getElementById("posts");
let all=[];

fetch("posts.json")
.then(r=>r.json())
.then(data=>{
all=data.reverse();
render(all);
});

function render(list){
posts.innerHTML="";
list.forEach((post,index)=>{
let html=`<div class="post">
<h2>${index<5?'🆕 ':''}${post.title}</h2>
<div class="links">`;
post.links.forEach((l,i)=>{
html+=`<a href="${l}" target="_blank">▶ Link ${i+1}</a>`;
});
html+=`</div></div>`;
posts.innerHTML+=html;
});
}
</script>

</body>
</html>
